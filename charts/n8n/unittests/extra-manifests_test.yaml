suite: test extra manifests

templates:
  - extra-manifests.yaml

release:
  name: n8n
  namespace: n8n

chart:
  version: 1.0.0
  appVersion: 1.0.0

tests:
  - it: should not render any documents when both extraManifests and extraTemplateManifests are empty
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a single object manifest from extraManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-extra-config
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: kind
          value: ConfigMap
      - equal:
          path: metadata.name
          value: my-extra-config
      - equal:
          path: data.key
          value: value

  - it: should auto-inject chart labels into extraManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-extra-config
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: n8n-1.0.0
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: n8n
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: "1.0.0"
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should render multiple object manifests from extraManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-one
          data:
            key: value1
        - apiVersion: v1
          kind: Secret
          metadata:
            name: secret-one
          stringData:
            password: secret
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: config-one
        documentIndex: 0
      - equal:
          path: kind
          value: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: secret-one
        documentIndex: 1

  - it: should render a custom resource from extraManifests
    set:
      extraManifests:
        - apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: postgresql
          spec:
            instances: 1
            storage:
              size: 5Gi
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1
      - equal:
          path: kind
          value: Cluster
      - equal:
          path: spec.instances
          value: 1

  - it: should render a manifest from extraTemplateManifests with chart labels
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-template-config
          data:
            release: n8n
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ConfigMap
      - equal:
          path: metadata.name
          value: my-template-config
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n

  - it: should render a string manifest from extraManifests
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-string-config
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ConfigMap
      - equal:
          path: metadata.name
          value: my-string-config
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n

  - it: should render manifests from both extraManifests and extraTemplateManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: static-config
          data:
            key: value
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 2

  - it: should split a multi-document string in extraManifests into separate resources
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-one
          data:
            key: value1
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: secret-one
          stringData:
            password: secret
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: config-one
        documentIndex: 0
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 0
      - equal:
          path: kind
          value: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: secret-one
        documentIndex: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 1

  - it: should ignore a leading document separator in an extraManifests string
    set:
      extraManifests:
        - |
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-after-separator
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ConfigMap
      - equal:
          path: metadata.name
          value: config-after-separator

  - it: should split a multi-document string in extraTemplateManifests into separate resources
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config-one
          data:
            key: value1
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config-two
          data:
            key: value2
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: template-config-one
        documentIndex: 0
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 0
      - equal:
          path: metadata.name
          value: template-config-two
        documentIndex: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 1

  - it: should ignore a leading document separator in an extraTemplateManifests string
    set:
      extraTemplateManifests:
        - |
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-after-separator
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ConfigMap
      - equal:
          path: metadata.name
          value: template-after-separator

  - it: should evaluate Helm template functions in extraTemplateManifests
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: {{ .Release.Name }}-dynamic
            namespace: {{ .Release.Namespace }}
          data:
            release: {{ .Release.Name }}
            chart: {{ .Chart.Name }}
            version: {{ .Chart.AppVersion }}
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: n8n-dynamic
      - equal:
          path: metadata.namespace
          value: n8n
      - equal:
          path: data.release
          value: n8n
      - equal:
          path: data.chart
          value: n8n
      - equal:
          path: data.version
          value: "1.0.0"

  - it: should preserve user-provided labels alongside injected chart labels
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: labelled-config
            labels:
              custom-label: custom-value
              team: platform
          data:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels["custom-label"]
          value: custom-value
      - equal:
          path: metadata.labels["team"]
          value: platform
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: n8n-1.0.0

  - it: should handle mixed object and string items in extraManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: object-config
          data:
            key: value
        - |
          apiVersion: v1
          kind: Secret
          metadata:
            name: string-secret
          stringData:
            password: secret123
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: kind
          value: ConfigMap
        documentIndex: 0
      - equal:
          path: metadata.name
          value: object-config
        documentIndex: 0
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 0
      - equal:
          path: kind
          value: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: string-secret
        documentIndex: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: n8n
        documentIndex: 1

  - it: should match snapshot for Helm template functions in extraTemplateManifests
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: {{ .Release.Name }}-dynamic
            namespace: {{ .Release.Namespace }}
          data:
            release: {{ .Release.Name }}
            chart: {{ .Chart.Name }}
            version: {{ .Chart.AppVersion }}
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for manifest with user-provided labels
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: labelled-config
            labels:
              custom-label: custom-value
              team: platform
          data:
            key: value
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for multi-document string in extraManifests
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: config-one
          data:
            key: value1
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: secret-one
          stringData:
            password: secret
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for multi-document string in extraTemplateManifests
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config-one
          data:
            key: value1
          ---
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config-two
          data:
            key: value2
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for object manifest in extraManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-extra-config
          data:
            key: value
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for string manifest in extraManifests
    set:
      extraManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-string-config
          data:
            key: value
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for template manifest in extraTemplateManifests
    set:
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: my-template-config
          data:
            release: n8n
    asserts:
      - matchSnapshot: {}

  - it: should match snapshot for combined extraManifests and extraTemplateManifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: static-config
          data:
            key: value
      extraTemplateManifests:
        - |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: template-config
          data:
            key: value
    asserts:
      - matchSnapshot: {}
