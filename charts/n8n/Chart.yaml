      description: Update n8nio/n8n image version to 2.26.8
      links:
        - name: Upstream Project
          url: https://github.com/n8n-io/n8n
    - kind: fixed
      description: Fix broken screenshot URL(s) in n8n chart
  artifacthub.io/images: |
