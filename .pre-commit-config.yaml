repos:
  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=charts
          - --template-files=README.md.gotmpl

  - repo: https://github.com/stackrox/kube-linter
    rev: v0.8.3
    hooks:
      - id: kube-linter
        files: ^charts/.*
        args: ["--config", ".kube-linter.yaml"]

  - repo: https://github.com/mxab/pre-commit-trivy
    rev: v0.18.0
    hooks:
      - id: trivyfs-docker
        files: ^charts/.*
        args:
          - --severity
          - HIGH,CRITICAL
          - --exit-code
          - "1"
          - --skip-dirs
          - ".git,charts/*/charts,.claude,.vscode,.github,.agent,docs,tmp"
          - .
